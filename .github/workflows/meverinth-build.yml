name: Meverinth build

on:
  workflow_dispatch:
    inputs:
      version-override:
        description: Version to stamp into the built binaries (leave empty to use apps/app-frontend/package.json)
        type: string
        required: false
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            label: linux-x86_64
            artifact-glob: |
              target/release/bundle/deb/*.deb
              target/release/bundle/rpm/*.rpm
              target/release/bundle/appimage/*.AppImage
          - platform: macos-latest
            label: macos-arm64
            artifact-glob: |
              target/release/bundle/dmg/*.dmg
          - platform: windows-latest
            label: windows-x86_64
            artifact-glob: |
              target/release/bundle/nsis/*.exe
              target/release/bundle/msi/*.msi
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/app
          shared-key: meverinth-${{ matrix.label }}

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            build-essential \
            file \
            patchelf

      - name: Enable Corepack
        run: corepack enable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Choose Meverinth version
        shell: bash
        run: |
          VERSION_INPUT="${{ inputs.version-override }}"
          if [ -n "$VERSION_INPUT" ]; then
            VERSION="${VERSION_INPUT#v}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(node -p "require('./apps/app-frontend/package.json').version")"
            # Some Tauri bundlers (Windows NSIS in particular) reject non-numeric
            # prerelease suffixes like the default "1.0.0-local" placeholder, so
            # strip them for on-demand builds when the caller didn't override.
            VERSION="${VERSION%%-*}"
          fi
          if [ -z "$VERSION" ]; then
            echo "Failed to determine a Meverinth version" >&2
            exit 1
          fi
          echo "Building Meverinth $VERSION"
          echo "MEVERINTH_VERSION=$VERSION" >> "$GITHUB_ENV"
          node -e "
            const fs = require('fs');
            const path = 'apps/app-frontend/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = process.argv[1];
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          " "$VERSION"

      - name: Copy Modrinth API env
        shell: bash
        run: cp packages/app-lib/.env.prod packages/app-lib/.env

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Meverinth
        run: pnpm --filter=@modrinth/app run tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meverinth-${{ matrix.label }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: warn
          retention-days: 30

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
          fail_on_unmatched_files: false
